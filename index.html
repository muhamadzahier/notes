<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Simulator Platform</title>
    <!-- KaTeX CDN for mathematical typesetting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- Three.js and OrbitControls CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        /* Minimalist Black & White Theme */
        :root {
            --bg-primary: #ffffff;
            --text-primary: #000000;
            --border-color: #000000;
            --hover-bg: #000000;
            --hover-text: #ffffff;
            --gray-light: #f5f5f5;
            --gray-medium: #e0e0e0;
            --gray-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a, button, input, select, textarea {
            font-family: inherit;
            color: inherit;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        /* Navigation Bar */
        header {
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 100;
        }

        .nav-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            padding: 0.25rem 0.75rem;
        }

        .brand:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
        }

        .nav-breadcrumbs {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Button styling */
        .btn-minimal {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-minimal:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
        }

        /* Layout Views */
        main {
            flex: 1;
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        /* Homescreen Dashboard CSS */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .section-title {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Catalog Card CSS */
        .semester-section {
            margin-bottom: 2rem;
        }

        .course-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        @media (min-width: 640px) {
            .course-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .course-card {
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .course-card:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
        }

        .course-card h4 {
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
        }

        .course-card p {
            font-size: 0.875rem;
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }

        .course-card .arrow {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Saved list item CSS */
        .saved-item {
            border: 1px solid var(--border-color);
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (min-width: 480px) {
            .saved-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .saved-item-info {
            flex: 1;
        }

        .saved-item-title {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .saved-item-meta {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .saved-item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action-small {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-action-small:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
        }

        .btn-delete {
            border-color: #ff3b30;
            color: #ff3b30;
        }

        .btn-delete:hover {
            background-color: #ff3b30;
            color: white;
            border-color: #ff3b30;
        }

        /* Active Simulator Views Layout */
        .simulator-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .simulator-title-text {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* 3D Electromagnetics Simulator layout CSS */
        .em-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            height: auto;
        }

        @media (min-width: 768px) {
            .em-grid {
                position: relative;
                display: block;
                height: calc(100vh - 200px);
                min-height: 550px;
            }
            .canvas-container {
                width: 100% !important;
                height: 100% !important;
            }
            .sidebar-container {
                position: absolute;
                top: 50px;
                right: 10px;
                bottom: 10px;
                width: 320px;
                z-index: 15;
                background: rgba(255, 255, 255, 0.95);
                border: 2px solid var(--border-color);
                box-shadow: 4px 4px 0 #000;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                transition: all 0.2s ease;
            }
            .sidebar-container.collapsed {
                display: none !important;
            }
        }

        .canvas-container {
            border: 1px solid var(--border-color);
            position: relative;
            background-color: #fafafa;
            min-height: 400px;
            height: 100%;
        }

        .canvas-overlay-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 140px;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            z-index: 10;
        }

        .canvas-label-coord {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #000;
            padding: 0.25rem 0.5rem;
            font-family: monospace;
            font-size: 0.8rem;
            z-index: 10;
        }

        .sidebar-container {
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            background: white;
            overflow-y: auto;
        }

        .sidebar-section {
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-section-title {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--gray-medium);
            padding-bottom: 0.25rem;
        }

        /* List of active spawned items */
        .spawned-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--gray-medium);
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .spawned-item-row button {
            color: #ff3b30;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Math derivations */
        .math-derivations-box {
            font-size: 0.9rem;
            white-space: normal;
            word-wrap: break-word;
            word-break: break-word;
        }

        .math-derivations-box p {
            margin-bottom: 0.75rem;
            white-space: normal;
            word-wrap: break-word;
            word-break: break-word;
        }

        /* Responsive Mobile Tabs */
        .mobile-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .mobile-tabs {
                display: none !important;
            }
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            padding: 0.75rem 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
        }

        .tab-btn.active {
            border-bottom-color: var(--border-color);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 0.75rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .form-control {
            width: 100%;
            padding: 0.375rem 0.5rem;
            font-size: 0.875rem;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .form-control:focus {
            outline: none;
            background-color: var(--gray-light);
        }

        /* KaTeX custom spacing */
        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.5rem 0;
        }

        /* Workspace split-pane layout styling */
        .workspace-layout {
            display: flex;
            width: 100%;
            height: calc(100vh - 160px);
            min-height: 550px;
            gap: 0;
            overflow: hidden;
            border: 2px solid var(--border-color);
            margin-top: 1rem;
            background-color: var(--bg-primary);
        }
        
        .workspace-sidebar {
            width: 42%;
            min-width: 380px;
            max-width: 500px;
            height: 100%;
            border-right: 2px solid var(--border-color);
            background-color: var(--bg-primary);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .workspace-viewport {
            flex: 1;
            height: 100%;
            overflow: hidden;
            position: relative;
            background-color: var(--gray-light);
        }

        /* Mode toggles logic */
        .portal-mode-sandbox .workspace-sidebar {
            display: none !important;
        }

        .portal-mode-sandbox .workspace-viewport {
            width: 100%;
        }

        /* Adjust internal simulator layout when side-by-side mode is active */
        .portal-mode-split .em-grid {
            height: 100% !important;
            gap: 1rem !important;
        }

        .portal-mode-split .canvas-container {
            height: 100% !important;
            border: none !important;
        }
        
        .portal-mode-split .mobile-tabs {
            display: none !important;
        }



        /* Toggle Sidebar Button */
        .btn-toggle-sidebar {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            font-weight: bold;
            border: 1.5px solid #000;
            box-shadow: 2px 2px 0 #000;
            white-space: nowrap;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0.25rem 0.5rem;
            background: white;
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        .btn-toggle-sidebar:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
        }

        @media (max-width: 991.98px) {
            .btn-toggle-sidebar {
                display: none !important;
            }
            .canvas-overlay-ui {
                right: 10px !important;
            }
        }

        /* Layout modes toggles */
        .workspace-layout.layout-sidebar-only .workspace-viewport {
            display: none !important;
        }
        .workspace-layout.layout-sidebar-only .workspace-sidebar {
            width: 100% !important;
            max-width: none !important;
            border-right: none !important;
        }

        .workspace-layout.layout-viewport-only .workspace-sidebar {
            display: none !important;
        }
        .workspace-layout.layout-viewport-only .workspace-viewport {
            width: 100% !important;
        }

        /* Workspace Sidebar Content Styling */
        .workspace-sidebar-header {
            border-bottom: 2px solid var(--border-color);
            padding: 1rem;
            background-color: var(--gray-light);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .workspace-sidebar-content {
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
        }
        
        .sidebar-select {
            width: 100%;
            padding: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid var(--border-color);
            background: white;
            cursor: pointer;
            margin-bottom: 0.75rem;
        }
        .sidebar-select:focus {
            outline: none;
            background-color: var(--gray-light);
        }

        /* Professional SVGs in Workspace Tabs */
        .workspace-modes-tabs {
            display: flex;
            gap: 0.25rem;
            border: 2px solid var(--border-color);
            padding: 2px;
            background-color: var(--gray-light);
            margin: 0 1rem;
        }
        
        .mode-tab-btn {
            background: transparent;
            border: none;
            padding: 0.35rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            transition: all 0.15s ease;
        }
        .mode-tab-btn:hover {
            background-color: var(--gray-medium);
        }
        .mode-tab-btn.active {
            background-color: #000000;
            color: #ffffff;
        }
        
        .icon {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Markdown rendering styles in Sidebar */
        .sidebar-text-content h1, 
        .sidebar-text-content h2 {
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 1.5rem 0 0.75rem 0;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.25rem;
            font-weight: 800;
        }
        .sidebar-text-content h1:first-child,
        .sidebar-text-content h2:first-child {
            margin-top: 0;
        }
        .sidebar-text-content h3 {
            font-size: 1rem;
            margin: 1.25rem 0 0.5rem 0;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-medium);
            padding-bottom: 0.15rem;
            font-weight: 700;
        }
        .sidebar-text-content p {
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.5;
            color: var(--gray-dark);
        }
        .sidebar-text-content blockquote {
            border-left: 3px solid var(--border-color);
            padding-left: 0.75rem;
            margin: 1rem 0;
            font-style: italic;
            color: #444;
        }
        .sidebar-text-content ul, 
        .sidebar-text-content ol {
            margin: 0 0 1rem 1.25rem;
            font-size: 0.85rem;
        }
        .sidebar-text-content li {
            margin-bottom: 0.35rem;
            line-height: 1.5;
        }
        
        /* Math callout boxes */
        .formula-box {
            border: 1px solid var(--border-color);
            background-color: var(--gray-light);
            padding: 0.75rem 1rem;
            margin: 1.25rem 0;
            overflow-x: auto;
        }
        .calculation-box {
            border: 2px dashed var(--border-color);
            background-color: #fafafa;
            padding: 1rem;
            margin: 1.5rem 0;
        }
        .calculation-box h4 {
            text-transform: uppercase;
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        /* List Items in Sidebar (e.g. Question Selectors) */
        .sidebar-list-item {
            border: 1px solid var(--border-color);
            padding: 0.65rem 0.85rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.15s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-list-item:hover {
            background-color: var(--gray-light);
        }
        .sidebar-list-item.active {
            background-color: #000000;
            color: #ffffff;
        }

        /* Visualization Panel inside Notes/Solver */
        .vis-panel-card {
            border: 1px solid var(--border-color);
            background-color: white;
            margin-top: 1.25rem;
            margin-bottom: 1.25rem;
        }
        .vis-panel-header {
            background-color: var(--gray-light);
            border-bottom: 1px solid var(--border-color);
            padding: 0.4rem 0.75rem;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vis-panel-body {
            padding: 0.75rem;
            position: relative;
        }
        .vis-panel-description {
            font-size: 0.725rem;
            color: #555;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        /* Custom 2D Vector Field canvas */
        .vector-field-canvas {
            width: 100%;
            height: 250px;
            background-color: #0d1326;
            border: 1px solid #1e293b;
            border-radius: 4px;
            display: block;
        }

        /* Interactive Solver control buttons */
        .btn-solve-action {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            width: 100%;
            justify-content: center;
            margin-top: 0.75rem;
            padding: 0.55rem 0.85rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid var(--border-color);
            background-color: #000000;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-solve-action:hover {
            background-color: transparent;
            color: #000000;
        }
        
        /* Table rendering in notes */
        .sidebar-text-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.25rem 0;
            font-size: 0.75rem;
        }
        .sidebar-text-content th, 
        .sidebar-text-content td {
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.5rem;
            text-align: left;
        }
        .sidebar-text-content th {
            background-color: var(--gray-light);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Command Palette (Ctrl+K) */
        .cmd-palette-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 9999;
            display: flex;
            justify-content: center;
            padding-top: 15vh;
            animation: cmd-fade-in 0.12s ease-out;
        }
        @keyframes cmd-fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .cmd-palette {
            width: 520px;
            max-width: 95vw;
            max-height: 450px;
            background: white;
            border: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .cmd-palette-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-bottom: 2px solid var(--border-color);
            outline: none;
            font-family: inherit;
        }
        .cmd-palette-results {
            overflow-y: auto;
            flex: 1;
        }
        .cmd-palette-item {
            padding: 0.6rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--gray-medium);
            font-size: 0.8rem;
        }
        .cmd-palette-item:hover,
        .cmd-palette-item.selected {
            background-color: var(--hover-bg);
            color: var(--hover-text);
        }
        .cmd-badge {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.1rem 0.4rem;
            border: 1px solid currentColor;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }
        .cmd-hint {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-left: auto;
        }
        .cmd-empty {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #000;
            color: #fff;
            padding: 0.75rem 1.25rem;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 10000;
            animation: toast-slide-in 0.3s ease-out, toast-fade-out 0.3s ease-in 2.7s forwards;
            max-width: 350px;
        }
        @keyframes toast-slide-in {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes toast-fade-out {
            to { opacity: 0; transform: translateY(10px); }
        }

        /* Sandbox link pill button */
        .sandbox-link-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            background: var(--gray-light);
            cursor: pointer;
            transition: all 0.15s;
            margin: 0.25rem 0;
        }
        .sandbox-link-pill:hover {
            background: #000;
            color: #fff;
        }

        /* Related Notes button */
        .btn-related-notes {
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border: 1px solid #000;
            background: transparent;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }
        .btn-related-notes:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="#" id="nav-home" class="brand">SIMULATOR</a>
                <div id="nav-breadcrumbs" class="nav-breadcrumbs"></div>
            </div>
            <div>
                <span class="text-xs font-mono hidden sm:inline">OFFLINE MODE</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Homescreen View -->
        <div id="home-view" class="dashboard-grid">
            <!-- Left: Semester Directories -->
            <div>
                <h2 class="section-title">Semesters & Courses</h2>
                <div id="course-catalog">
                    <!-- Dynamic rendering from app.js -->
                </div>
            </div>
            
            <!-- Right: Saved runs list -->
            <div>
                <h2 class="section-title">Saved Simulations</h2>
                <div id="saved-list">
                    <!-- Dynamic rendering from IndexedDB -->
                </div>
            </div>
        </div>

        <!-- Simulator View Container -->
        <div id="sim-view" class="hidden">
            <div class="simulator-header-bar">
                <div class="simulator-title-text" id="sim-title">Simulator</div>
                
                <!-- Workspace Mode Tabs -->
                <div class="workspace-modes-tabs" id="workspace-modes-tabs">
                    <button class="mode-tab-btn active" id="mode-tab-sandbox">
                        <svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                        <span>Sandbox</span>
                    </button>
                    <button class="mode-tab-btn" id="mode-tab-notes">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        <span>Study Notes</span>
                    </button>
                    <button class="mode-tab-btn" id="mode-tab-tutorials">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span>Tutorial Solver</span>
                    </button>
                    <button class="mode-tab-btn" id="mode-tab-quiz">
                        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        <span>Quiz</span>
                    </button>
                </div>

                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <div class="workspace-modes-tabs" id="layout-toggle-container" style="margin: 0; display: none;">
                        <button class="mode-tab-btn active" id="btn-layout-split" title="Split View">
                            <span style="font-size: 0.75rem;">🔲 Split</span>
                        </button>
                        <button class="mode-tab-btn" id="btn-layout-sidebar" title="Show Content Only">
                            <span style="font-size: 0.75rem;">📖 Content</span>
                        </button>
                        <button class="mode-tab-btn" id="btn-layout-viewport" title="Show Sim Only">
                            <span style="font-size: 0.75rem;">🎮 Sim</span>
                        </button>
                    </div>
                    <button id="btn-save-sim" class="btn-minimal">Save Run</button>
                </div>
            </div>
            
            <!-- Dynamic workspace layout -->
            <div class="workspace-layout portal-mode-sandbox" id="workspace-layout">
                <!-- Sidebar (Notes, Tutorials, etc.) -->
                <div class="workspace-sidebar" id="workspace-sidebar"></div>
                
                <!-- Viewport (Three.js Simulator Target) -->
                <div class="workspace-viewport" id="workspace-viewport">
                    <div id="sim-container" style="width: 100%; height: 100%;">
                        <!-- Dynamically injected simulator view -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Command Palette Modal (Ctrl+K) -->
    <div id="cmd-palette-overlay" class="cmd-palette-overlay" style="display: none;">
        <div class="cmd-palette">
            <input type="text" id="cmd-palette-input" class="cmd-palette-input" placeholder="Search notes, tutorials, simulators... (Esc to close)">
            <div id="cmd-palette-results" class="cmd-palette-results"></div>
        </div>
    </div>

    <!-- Load Local Notes & Tutorial Datasets -->
    <script src="semester 2/Electromagnetic Theory/notes/chapter3_notes.js"></script>
    <script src="semester 2/Electromagnetic Theory/notes/chapter4_notes.js"></script>
    <script src="semester 2/Electromagnetic Theory/question paper/tutorial_c3.js"></script>

    <!-- Load Local DB Layer -->
    <script src="system/db.js"></script>
    <!-- Load Local App Controller -->
    <script src="system/app.js"></script>

</body>
</html>
